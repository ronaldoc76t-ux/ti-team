[pytest]
# Pytest configuration for CMDB ServiceNow Discovery

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=implementation
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    security: Security tests
    slow: Slow running tests

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning

# Coverage
[coverage:run]
source = implementation
omit =
    */tests/*
    */test_*.py

[coverage:report]
precision = 2
show_missing = True